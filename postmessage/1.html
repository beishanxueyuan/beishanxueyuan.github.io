<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PostMessage Demo</title>
</head>
<body>
    <h1>PostMessage Demo</h1>
   <iframe style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; margin: 0; padding: 0; overflow: hidden; z-index: 9999;" src="https://login.work.weixin.qq.com/wwlogin/partner/login?appid=MjAwMDAx&redirect_uri=https%3A%2F%2Fdocs.qq.com&redirect_type=callback&panel_size=middle&version=1.6.0" width="300" height="200"></iframe>
   <script>
        window.addEventListener('message', (event) => {
                document.body.innerHTML = 'Received message from parent:'+event.data;
        });
    </script>
</body>
</html>
