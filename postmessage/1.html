<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PostMessage Demo</title>
</head>
<body>
    <h1>PostMessage Demo</h1>
   <iframe src="https://docs.qq.com/scenario/wework-quick-login.html?redirect_uri=https%3A%2F%2Fdoc.weixin.qq.com%2Fhome%2Frecent&open_id_gray=1&code_gray=1" width="300" height="200"></iframe>
   <script>
        window.addEventListener('message', (event) => {
                document.body.innerHTML = 'Received message from parent:'+event.data;
        });
    </script>
</body>
</html>
